@import se.lu.nateko.cp.viewscore.IcosStyleConfig

@(includeMenu: Boolean, styleConf: IcosStyleConfig)
<style>

	@@import url('https://static.icos-cp.eu/fonts/OpenSans.css');

	/** Generic page styling and icons **/
	:root {
		--light-gray: #F5F5F6;
		--light-gray-rgb: 245, 245, 246;
		--blue-10: #E5F7FA;
		--blue-10-rgb: 229, 247, 250;
		--blue-20: #CCEEF3;
		--blue-20-rgb: 204, 238, 243;
		--icos-violet: #5C2B93;
		--icos-violet-rgb: 92, 43, 147;
	}

	main,
	.btn,
	.form-control,
	.form-select,
	.dropdown-menu {
		font-size: 14px;
	}

	h4, h5, h6 {
		margin-bottom: 0.5rem;
	}

	/* Icons */

	.right-arrow::after,
	.down-arrow::after,
	.external-link::after,
	a[target=_blank]:not(.hide-external)::after,
	.download::after,
	.date::before,
	.success::before,
	.warning::before,
	.info::before,
	.danger::before {
		font-family: "Font Awesome 6 Free";
		display: inline-block;
		vertical-align: middle;
		text-decoration: none;
		font-weight: 900;
	}

	.right-arrow::after,
	.down-arrow::after,
	.external-link::after,
	a[target=_blank]:not(.hide-external)::after,
	.download::after {
		padding-left: 0.65rem;
		margin-right: 0.25rem;
	}

	.date::before,
	.success::before,
	.warning::before,
	.info::before,
	.danger::before {
		padding-right: 0.65rem;
	}

	/* Icon content */
	.right-arrow::after {
		content: "\f178";
	}

	.down-arrow::after {
		content: "\f063";
	}

	.external-link::after,
	a[target=_blank]:not(.hide-external):not(.btn)::after {
		content: "\f08e";
	}

	.download::after {
		content: "\f019";
	}

	.date::before {
		content: "\f073";
	}

	.success::before {
		content: "\f058";
	}

	.warning::before {
		content: "\f071";
	}

	.info::before {
		content: "\f05a";
	}

	.danger::before {
		content: "\f057";
	}

	/* Additional font size utilities */
	.fs-xs {
		font-size: 0.75rem;
	}

	.fs-sm {
		font-size: 0.875rem;
	}

	.fs-md {
		font-size: 1rem;
	}

	.fs-lg {
		font-size: 1.125rem;
	}

	/* Violet color variants */
	.text-violet {
		--bs-text-opacity: 1;
		color: rgba(var(--icos-violet-rgb), var(--bs-text-opacity)) !important;
	}

	.bg-violet {
		--bs-bg-opacity: 1;
		background-color: rgba(var(--icos-violet-rgb), var(--bs-bg-opacity)) !important;
	}

	/* Blue 10 color variants */
	.text-blue-10 {
		--bs-text-opacity: 1;
		color: rgba(var(--blue-10-rgb), var(--bs-text-opacity)) !important;
	}

	.bg-blue-10 {
		--bs-bg-opacity: 1;
		background-color: rgba(var(--blue-10-rgb), var(--bs-bg-opacity)) !important;
	}

	.clear-both {
		clear: both;
	}

	.checkbox input,
	.radio input {
		border-color: var(--bs-secondary);
	}

	a:hover {
		color: var(--bs-danger);
	}

	/** Header **/
	.header .navbar-brand img {
		height: 36px;
	}

	.header #search-block-form {
		padding: 0px 15px;
	}

	.header .cart-link {
		display: flex;
	}

	.header .header-link a, .menu--main .menu-link a {
		color: var(--bs-dark);
		text-decoration: none;
	}

	.header .header-link a:hover, .menu--main .menu-link a:hover {
		color: var(--bs-danger);
		text-decoration: underline;
		text-underline-offset: 20%;
	}

	#search-block-form #edit-keys {
		width: 220px;
	}

	/* Breadcrumbs */
	.breadcrumb {
		font-size: 0.875rem;
		--bs-breadcrumb-divider: "\f105";
		--bs-breadcrumb-divider-color: var(--bs-primary);
		margin-top: 1rem;

		a {
			text-decoration-style: underline;
			text-decoration-thickness: 6%;
			text-decoration-skip-ink: none;
			text-underline-offset: 25%;
			text-underline-position: from-font;
		}
	}

	a:hover {
		text-decoration-thickness: 6%;
		text-decoration-skip-ink: none;
		text-underline-offset: 25%;
		text-underline-position: from-font;
	}

	.breadcrumb-item::before {
		font-family: "Font Awesome 6 Free";
		font-weight: 900;
	}

	/** Footer **/
	footer {
		padding: 2rem 5rem;
		/*margin-top: 8.75rem;*/

		.navbar-brand img {
			height: 60px;
		}

		a,
		a:hover,
		a:focus-within {
			color: var(--bs-light);
		}

		.footer-bottom .list-inline-item:not(:last-child) {
			margin-right: 2rem;
		}

		ul.social-media .list-inline-item:not(:last-child) {
			margin-right: 0.875rem;
		}

		hr {
			margin-top: 2.5rem;
			margin-bottom: 2.5rem;
			height: 1px;
			opacity: 0.16;
			background: var(--bs-light);
		}

		h3,
		.h6 {
			margin-bottom: 1rem;
		}

		.footer-bottom {
			margin-top: 6rem;
		}

		a:hover, a:focus-within, a:not([class]):hover, a:not([class]):focus-within {
			text-decoration: underline;
		}
	}

	a.social-media-icon {
		font-size: 20px;
		text-decoration: none !important;
		font-weight: 400;
		transition: color 0.1s;
	}

	a.social-media-icon:hover,
	a.social-media-icon:focus-within {
		color: #f7bbd0 !important;
	}

	/** Menu **/
	.menu--main {
		width: 100%;
		padding-left: calc((100% - 1400px)/2);
		padding-right: calc((100% - 1400px)/2);
	}

	#cp_theme_d10_menu {
		font-size: 0.9375rem;

		.dropdown-menu {
			font-size: 0.9375rem;
		}

		a {
			text-decoration: none;
			display: inline-block;
			transition: color 0.1s;
		}

		a:hover,
		a:focus-within {
			color: var(--bs-danger) !important;
			text-decoration: underline 10%;
		}

		.top-link:hover,
		.top-node:hover .top-link,
		.top-link:focus-within,
		.top-node:focus-within .top-link {
			text-decoration: underline 5%;
			text-underline-offset: 20%;
			color: var(--bs-dark) !important;
		}
	}

	/** Responsive media queries **/

	/* Larger than Bootstrap L breakpoint */
	@@media all and (min-width: 992px) {
		.mobile {
			display: none;
		}

		#cp_theme_d10_menu {
			.top-node:hover .dropdown-menu,
			.top-node:focus-within .dropdown-menu {
				display: flex;
				flex-wrap: none;
			}

			.top-node .dropdown-menu {
				left: 0;
				box-shadow: none;
				width: 100%;
				padding-left: 1rem;
				padding-right: 1rem;

				&>div {
					width: 19%;
				}
			}
		}
	}

	/* Smaller than Bootstrap L breakpoint */
	@@media all and (max-width: 991.999px) {
		#cp_theme_d10_menu {
			.nav {
				padding-bottom: 1rem;
			}

			.nav>div>a {
				justify-content: flex-start !important;
			}

			.top-node .top-link {
				display: block !important;
			}

			.top-node .dropdown-menu {
				border: none !important;
				box-shadow: none;
				padding-left: 3rem;
				padding-top: 0 !important;
				padding-bottom: 0 !important;

				.list-item>div.pt-3.pb-3 {
					height: 0;
					font-size: 0;
					padding: 0 !important;
				}
			}

			.top-node.open .dropdown-menu {
				display: block;
			}

			.top-node.open>a {
				font-weight: 600;
			}

			.menu-level-3 {
				padding-left: 2rem;
			}
		}

		footer {
			padding-left: 3rem;
			padding-right: 3rem;

			.region-footer-third,
			.region-footer-fourth {
				margin-top: 2rem;
			}

			.footer-bottom {
				margin-top: 3rem;

				.list-inline-item {
					display: block;
					margin-bottom: 1rem;
				}
			}
		}

		.header .header-link {
			display: none;
		}
	}

	/* Smaller than Bootstrap M breakpoint */
	@@media all and (max-width: 767.98px) {
		footer {
			padding-left: 2rem;
			padding-right: 2rem;
		}
	}

	/* Smaller than Bootstrap S breakpoint */
	@@media all and (max-width: 575.98px) {
		footer {
			padding-left: 1rem;
			padding-right: 1rem;
		}

		#search-block-form {
			#edit-keys {
				display: none;
			}

			#edit-submit {
				border-radius: 100px;
			}
		}
	}

	/* Larger than Bootstrap XXL breakpoint */
	@@media all and (min-width: 1400px) {
		.header {
			width: 100%;
			padding-left: calc((100% - 1400px)/2);
			padding-right: calc((100% - 1400px)/2);
		}

		.menu--main {
			width: 100%;
			padding-left: calc((100% - 1400px)/2);
			padding-right: calc((100% - 1400px)/2);
		}

		#cp_theme_d10_menu {
			.top-node:hover .dropdown-menu,
			.top-node:focus-within .dropdown-menu {
				&>div {
					width: 316px;
				}
			}

			.top-node .dropdown-menu {
				padding-left: calc((100% - 1400px)/2 + 1rem);
				padding-right: calc((100% - 1400px)/2 + 1rem);
			}
		}
	}
</style>
